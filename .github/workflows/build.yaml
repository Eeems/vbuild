name: Check and Build
on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  release:
    types: [ released ]
permissions: read-all
jobs:
  lint:
    name: Lint codebase
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python: &python-versions
          - "3.12"
          - "3.13"
          - "3.14"
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - &install-emake
        name: Install emake
        run: pip install emake
      - name: Run lint
        run: emake lint

  test_matrix:
    name: Build test matrix
    runs-on: ubuntu-latest
    outputs:
      paths: ${{ steps.paths.outputs.JSON_CONTENT }}
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Output matrix
        id: paths
        run: |
          set -e
          set -o pipefail
          if [ ! -d tests ]; then
            echo "Error: Failed to find tests directory"
            ls -l
            exit 1
          fi
          content=$(jq -ncR '[inputs]' <<< $(find tests -mindepth 2 -maxdepth 2 -type f -name VELBUILD | xargs -rn1 dirname | xargs -rn1 basename))
          echo "$content"
          echo 'JSON_CONTENT<<EOF' >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

  unit_test:
    name: Unit test
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python: *python-versions
      fail-fast: false
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: "pip"
      - *install-emake
      - name: Run tests
        run: make test

  test_python:
    name: Test python
    runs-on: ubuntu-22.04
    needs: test_matrix
    strategy:
      matrix:
        path: ${{ fromJson(needs.test_matrix.outputs.paths) }}
        driver:
          - podman
          - docker
      fail-fast: false
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: 3.14
          cache: "pip"
      - *install-emake
      - name: Run vbuild
        run: |
          set -e
          if [ -f "tests/${{ matrix.path }}/$driver.skip" ];then
            echo "SKIPPED"
            exit 0
          fi
          if [ "$driver" == 'podman' ];then
            echo "Starting podman service..."
            sudo mkdir -p /run/user/"$(id -u)"/podman
            socketdir=/run/user/"$(id -u)"/podman
            sudo chown "$(id -u):$(id -g)" "$socketdir"
            podman system service --time 0 unix://"$socketdir/podman.sock" &
            tries=0
            while [ ! -S "$socketdir/podman.sock" ] && [ $tries -lt 60 ];do
              tries=$(( tries + 1 ))
              sleep 0.1
            done
          fi
          echo "Running vbuild..."
          emake requirements
          source .venv/bin/activate
          action=all
          if [ -f "tests/${{ matrix.path }}/action" ];then
            action="$(cat "tests/${{ matrix.path }}/action")"
          fi
          CARCH=noarch
          if [ -f "tests/${{ matrix.path }}/arch" ];then
            CARCH="$(cat "tests/${{ matrix.path }}/arch")"
          fi
          CARCH=$CARCH \
          VBUILD_DRIVER=$driver \
          python -m vbuild -C "tests/${{ matrix.path }}" "$action"
          if [ "$driver" == 'podman' ];then
            echo "Stopping podman service..."
            kill $(jobs -p) || true
          fi
        env:
          driver: ${{ matrix.driver }}
      - name: Validate output
        if: "!cancelled()"
        shell: bash
        run: |
          set -e
          if [ -f "tests/${{ matrix.path }}/${{ matrix.driver }}.skip" ];then
            echo "SKIPPED"
            exit 0
          fi
          if [ -f tests/${{ matrix.path }}/validate.sh ];then
            tests/${{ matrix.path }}/validate.sh
          fi

  build-executable:
    name: Build executable
    needs:
      - unit_test
      - test_python
      - lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.14"
        arch:
          - x86_64
        libc:
          - glibc
          - musl
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - *install-emake
      - name: Building executable
        run: |
          emake build \
            --executable \
            --arch ${{ matrix.arch }} \
            --libc ${{ matrix.libc }} \
            --python ${{ matrix.python }} \
            ${{ matrix.nocompress && '--no-compress' || '' }}
      - uses: actions/upload-artifact@v6
        with:
          name: vbuild-${{ matrix.arch }}-${{ matrix.libc }}
          path: dist/*
          if-no-files-found: error

  test_executable:
    name: Test executable
    runs-on: ubuntu-latest
    needs:
      - test_matrix
      - build-executable
    strategy:
      matrix:
        path: ${{ fromJson(needs.test_matrix.outputs.paths) }}
        driver:
          - podman
          - docker
        os:
          - ubuntu
      fail-fast: false
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Download executable
        id: download
        uses: actions/download-artifact@v8
        with:
          name: vbuild-${{ matrix.os }}
          path: dist
      - name: Run vbuild
        if: matrix.os != 'alpine'
        shell: bash
        run: |
          set -e
          if [ -f "tests/${{ matrix.path }}/$driver.skip" ];then
            echo "SKIPPED"
            exit 0
          fi
          if [ "$driver" == 'podman' ];then
            echo "Starting podman service..."
            sudo mkdir -p /run/user/"$(id -u)"/podman
            socketdir=/run/user/"$(id -u)"/podman
            sudo chown "$(id -u):$(id -g)" "$socketdir"
            podman system service --time 0 unix://"$socketdir/podman.sock" &
            tries=0
            while [ ! -S "$socketdir/podman.sock" ] && [ $tries -lt 60 ];do
              tries=$(( tries + 1 ))
              sleep 0.1
            done
          fi
          echo "Running vbuild..."
          chmod +x dist/vbuild
          action=all
          if [ -f "tests/${{ matrix.path }}/action" ];then
            action="$(cat "tests/${{ matrix.path }}/action")"
          fi
          CARCH=noarch
          if [ -f "tests/${{ matrix.path }}/arch" ];then
            CARCH="$(cat "tests/${{ matrix.path }}/arch")"
          fi
          CARCH=$CARCH \
          VBUILD_DRIVER=$driver \
          dist/vbuild -C "tests/${{ matrix.path }}" "$action"
          if [ "$driver" == 'podman' ];then
            echo "Stopping podman service..."
            kill $(jobs -p) || true
          fi
        env:
          driver: ${{ matrix.driver }}
      - name: Validate output
        if: "!cancelled()"
        shell: bash
        run: |
          set -e
          if [ -f "tests/${{ matrix.path }}/${{ matrix.driver }}.skip" ];then
            echo "SKIPPED"
            exit 0
          fi
          if [ -f tests/${{ matrix.path }}/validate.sh ];then
            tests/${{ matrix.path }}/validate.sh
          fi

  release:
    name: Add ${{ matrix.artifact }} to release
    if: github.repository == 'Eeems/vbuild' && github.event_name == 'release' && startsWith(github.ref, 'refs/tags')
    needs: test_executable
    runs-on: ubuntu-latest
    strategy:
      matrix:
        artifact:
          - "vbuild-x86_64-glibc"
          - "vbuild-x86_64-musl"
    permissions:
      contents: write
    steps:
      - name: Checkout the Git repository
        uses: actions/checkout@v6
      - name: Download executable
        id: download
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: dist
      - name: Upload to release
        run: |
          if [ -f vbuild ]; then
            name="vbuild-${{ matrix.artifact }}"
            mv vbuild "$name"
            gh release upload "$TAG" "$name" --clobber
          elif [ -f vbuild-portable ]; then
            name="vbuild-${{ matrix.artifact }}"
            mv vbuild-portable "$name"
            gh release upload "$TAG" "$name" --clobber
          else
            find . -type f | xargs -rI {} gh release upload "$TAG" {} --clobber
          fi
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        working-directory: ${{ steps.download.outputs.download-path }}
